 一句话总结

  build_design(yaml) = build_ir(yaml) → export_ir_to_metal(ir)。前半段把 YAML 解析成 DesignIR（纯 shapely 几何 + Pin + 连线），后半段用空壳 NativeComponent 直接写 design.qgeometry 表与
  pins —— 全程不实例化任何 TransmonPocket/RouteMeander 等 qlibrary 类。

  完整工作流

   ┌──────────────────────────────────────────────────────────────────────────┐
   │                          *.metal.yaml  (schema=3)                        │
   │  vars / hamiltonian / circuit / netlist / geometry{design,templates,    │
   │                                                  components,transforms}  │
   └───────────────────────────────────┬──────────────────────────────────────┘
                                       │
                                       ▼
                         ╔══════════════════════════╗
                         ║   PHASE 1 — build_ir()   ║   builder.py:1229
                         ╚══════════════════════════╝
                                       │
     ┌─────────────────────────────────┼──────────────────────────────────┐
     │ 1. _load_yaml + _expand_includes  ($include 文件展开)              │
     │ 2. _reject_unknown_keys(ROOT_KEYS) + schema 校验                   │
     │ 3. vars → ctx  ;  _walk_substitute() 解 ${...} 表达式             │
     │     • circuit ← vars                                              │
     │     • hamiltonian ← vars + circuit                                │
     │     • netlist    ← vars + circuit + hamiltonian                   │
     │ 4. _design_variable_context()                                     │
     │     ── 临时 new 一个 DesignPlanar 只为读 design.variables          │
     │        (cpw_width 之类的符号默认值)                                │
     │ 5. ComponentTemplateRegistry 加载 transmon_pocket / base_qubit /  │
     │    qcomponent 等 dsl_templates/*.yaml                              │
     └─────────────────────────────────┬──────────────────────────────────┘
                                       │
                                       ▼
              ┌──────────────  _parse_components()  builder.py:978  ──────────────┐
              │  对每个 component:                                                │
              │                                                                    │
              │   (a) expand_component_template()                                  │
              │       walk inheritance chain → 合并默认 options/metadata/geometry  │
              │       (type: transmon_pocket → base_qubit → qcomponent)            │
              │                                                                    │
              │   (b) component_ctx = vars + {component, options}                  │
              │       _walk_substitute(spec) 解 ${options.pad_width} 等           │
              │                                                                    │
              │   (c) evaluate_geometry_operations()  geometry_ops.py             │
              │       run YAML 中的 operations:  shapely rectangle/buffer/        │
              │       union/difference/translate/rotate/...                       │
              │       结果存 operation_outputs (后续 from_operation 引用)         │
              │                                                                    │
              │   (d) _expand_component_generators()  for_each / as ...           │
              │       动态批量生成 primitives + pins (e.g. 多 readout pin)        │
              │                                                                    │
              │   (e) primitives  →  _primitive_from_spec()                       │
              │        ├ poly.rectangle   → shapely.Polygon                       │
              │        ├ poly.polygon     → shapely.Polygon(points)               │
              │        ├ path.line/polyline → shapely.LineString                  │
              │        ├ junction.line    → shapely.LineString                    │
              │        ├ *.from_operation → 取 operation_outputs 中的几何        │
              │        最后 _apply_transform_to_geometry()                         │
              │        (rotate/translate 合并 geometry.transforms[name])          │
              │                                                                    │
              │   (f) pins → _pin_from_spec()                                     │
              │        ├ mode=tangent_points  (两点连线 == width)                  │
              │        └ mode=normal_segment  (从 operation 的最后一段法向生成)    │
              │        同样应用 transform                                          │
              │                                                                    │
              │   → ComponentIR(primitives=[PrimitiveIR], pins=[PinIR], ...)      │
              └──────────────────────────────┬─────────────────────────────────────┘
                                             │
                                             ▼
         ┌─ _derive()  ──────────────────────────────────────────────────┐
         │  计算每个 component 的 bounds、pin 中点；                     │
         │  _normalise_connections() 把 netlist 拆成                     │
         │  [{from:{component,pin}, to:{component,pin}, net_id:None}]    │
         │  _validate_netlist_endpoints() 检查端点合法且未复用            │
         └─────────────────────────────┬──────────────────────────────────┘
                                       │
                                       ▼
                  ╔═══════════════════════════════════════╗
                  ║   DesignIR  (纯数据,无 Qt/qlibrary)   ║
                  ║   schema / vars / hamiltonian /       ║
                  ║   circuit / netlist / design /        ║
                  ║   components[ComponentIR] / derived   ║
                  ╚═══════════════════╤═══════════════════╝
                                      │
                                      ▼
                    ╔══════════════════════════════════╗
                    ║ PHASE 2 — export_ir_to_metal()   ║   builder.py:1341
                    ╚══════════════════════════════════╝
                                      │
     ┌────────────────────────────────┼─────────────────────────────────┐
     │ 1. _instantiate_design()                                          │
     │      design = DesignPlanar(enable_renderers=False, ...)           │
     │      套用 ir.design.variables 与 chip.size                        │
     │                                                                   │
     │ 2. 对每个 ComponentIR:                                            │
     │      component = NativeComponent(design, name, make=False)        │
     │      ── 空壳子类(QComponent),make()  do-nothing,只为占用          │
     │         一个 component.id 和 qgeometry_table_usage                │
     │                                                                   │
     │      for primitive in primitives:                                 │
     │          design.qgeometry.add_qgeometry(                          │
     │              primitive.kind,           # 'poly'/'path'/'junction' │
     │              component.id,                                        │
     │              {primitive.name: primitive.geometry},  # shapely     │
     │              subtract / helper / layer / chip / width / fillet)   │
     │                                                                   │
     │      for pin in pins:                                             │
     │          component.add_pin(name, points, width,                   │
     │              input_as_norm=…, chip=…, gap=…)                      │
     │                                                                   │
     │ 3. for connection in derived.netlist.connections:                 │
     │      design.connect_pins(c1.id, pin1, c2.id, pin2)  → net_id      │
     │                                                                   │
     │ 4. design.metadata['dsl_chain'] = ir.to_metadata()                │
     │    post_build(design)  (可选回调)                                 │
     └────────────────────────────────┬─────────────────────────────────┘
                                      │
                                      ▼
                          ┌───────────────────────────┐
                          │  返回 QDesign             │
                          │  (qgeometry 表已填好,     │
                          │   pins 已注册,            │
                          │   net_info 已连接)        │
                          │  → 渲染/MetalGUI/GDS 输出 │
                          └───────────────────────────┘

  与传统 qlibrary 流程的关键差异

  ┌───────────────┬─────────────────────────────────────────────────────────┬──────────────────────────────────────────────────────────────────────────────────┐
  │     步骤      │                      传统 qlibrary                      │                                      DSL v3                                      │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ 几何来源      │ TransmonPocket(design, …).make() 内部 Python 画 shapely │ YAML operations: / primitives: 声明 shapely                                      │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ Component 类  │ 各专有子类（带 make()、default_options）                │ 统一 NativeComponent 空壳，make() 不做事                                         │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ 单位/变量解析 │ qcomponent 在 make() 里调 parse_value                   │ expression.py + _design_variable_context() 在 IR 阶段就解完                      │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ pins          │ qcomponent 的 make() 调 add_pin                         │ _pin_from_spec() 解析后由 exporter 调 add_pin                                    │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ 连线          │ 用户 Python 调 connect_pins 或路由组件                  │ netlist.connections 段声明，由 exporter 批量调                                   │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ 复用机制      │ Python 类继承                                           │ YAML templates + $extend/$for/generators + component_templates.inheritance_chain │
  └───────────────┴─────────────────────────────────────────────────────────┴──────────────────────────────────────────────────────────────────────────────────┘

  阶段产物速查（便于断点排查）


  ┌───────────────┬─────────────────────────────────────────────────────────┬──────────────────────────────────────────────────────────────────────────────────┐
  │     步骤      │                      传统 qlibrary                      │                                      DSL v3                                      │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ 几何来源      │ TransmonPocket(design, …).make() 内部 Python 画 shapely │ YAML operations: / primitives: 声明 shapely                                      │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ Component 类  │ 各专有子类（带 make()、default_options）                │ 统一 NativeComponent 空壳，make() 不做事                                         │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ 单位/变量解析 │ qcomponent 在 make() 里调 parse_value                   │ expression.py + _design_variable_context() 在 IR 阶段就解完                      │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ pins          │ qcomponent 的 make() 调 add_pin                         │ _pin_from_spec() 解析后由 exporter 调 add_pin                                    │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ 连线          │ 用户 Python 调 connect_pins 或路由组件                  │ netlist.connections 段声明，由 exporter 批量调                                   │
  ├───────────────┼─────────────────────────────────────────────────────────┼──────────────────────────────────────────────────────────────────────────────────┤
  │ 复用机制      │ Python 类继承                                           │ YAML templates + $extend/$for/generators + component_templates.inheritance_chain │
  └───────────────┴─────────────────────────────────────────────────────────┴──────────────────────────────────────────────────────────────────────────────────┘

  阶段产物速查（便于断点排查）

  - IR 出错 → 在 build_ir 返回前打印 ir.components[i].primitives[j].geometry（纯 shapely，可直接 .plot()）。
  - 模板没合对 → ir.components[i].inherited / ir.geometry["templates"]。
  - 连线失败 → ir.derived["netlist"]["connections"]（exporter 调 connect_pins 失败会抛 DesignDslError）。