schema: qiskit-metal/design-dsl/3

vars:
  qx: 1.2mm
  pad_w: 420um
  pad_h: 90um
  trace_w: 12um
  trace_gap: 7um
  bus_y: 0.55mm
  c_q: 65fF
  ej_q: 18GHz

hamiltonian:
  subsystems:
    Q1: {model: transmon, EJ: "${ej_q}", C: "${circuit.Q1.C}"}
    Q2: {model: transmon, EJ: "${ej_q}", C: "${circuit.Q2.C}"}
  couplings:
    - {from: Q1, to: Q2, g: 12MHz}

circuit:
  Q1: {type: transmon, C: "${c_q}", pad_width: "${pad_w}"}
  Q2: {type: transmon, C: "${c_q}", pad_width: "${pad_w}"}
  bus: {width: "${trace_w}", gap: "${trace_gap}"}

netlist:
  connections:
    - {from: Q1.bus, to: bus.start}
    - {from: bus.end, to: Q2.bus}

geometry:
  design:
    class: DesignPlanar
    chip: {size: 6mm x 6mm}

  templates:
    transmon_pad_pair:
      primitives:
        - {name: pad_left, type: poly.rectangle, center: [-0.12mm, 0mm],
           size: ["${circuit.Q1.pad_width}", "${pad_h}"], layer: 1}
        - {name: pad_right, type: poly.rectangle, center: [0.12mm, 0mm],
           size: ["${circuit.Q1.pad_width}", "${pad_h}"], layer: 1}
        - {name: pocket, type: poly.rectangle, center: [0mm, 0mm],
           size: [800um, 520um], subtract: true, layer: 1}
        - {name: jj, type: junction.line, points: [[0mm, -45um], [0mm, 45um]],
           width: 10um, layer: 1}

  components:
    Q1:
      $extend: transmon_pad_pair
      translate: ["-${qx}", 0mm]
      pins:
        - {name: bus, points: [[0.34mm, -6um], [0.34mm, 6um]],
           width: "${circuit.bus.width}", gap: "${circuit.bus.gap}"}

    Q2:
      $extend: transmon_pad_pair
      translate: ["${qx}", 0mm]
      primitives:
        - {name: pad_left, type: poly.rectangle, center: [-0.12mm, 0mm],
           size: ["${circuit.Q2.pad_width}", "${pad_h}"], layer: 1}
        - {name: pad_right, type: poly.rectangle, center: [0.12mm, 0mm],
           size: ["${circuit.Q2.pad_width}", "${pad_h}"], layer: 1}
        - {name: pocket, type: poly.rectangle, center: [0mm, 0mm],
           size: [800um, 520um], subtract: true, layer: 1}
        - {name: jj, type: junction.line, points: [[0mm, -45um], [0mm, 45um]],
           width: 10um, layer: 1}
      pins:
        - {name: bus, points: [[-0.34mm, -6um], [-0.34mm, 6um]],
           width: "${circuit.bus.width}", gap: "${circuit.bus.gap}"}

    bus:
      primitives:
        - {name: center_trace, type: path.polyline,
           points: [["-${qx}", "${bus_y}"], [0mm, "${bus_y}"], ["${qx}", "${bus_y}"]],
           width: "${circuit.bus.width}", layer: 1}
        - {name: gap_cut, type: path.polyline,
           points: [["-${qx}", "${bus_y}"], [0mm, "${bus_y}"], ["${qx}", "${bus_y}"]],
           width: 26um, subtract: true, layer: 1}
      pins:
        - {name: start, points: [["-${qx}", "${bus_y} - 6um"], ["-${qx}", "${bus_y} + 6um"]],
           width: "${circuit.bus.width}", gap: "${circuit.bus.gap}"}
        - {name: end, points: [["${qx}", "${bus_y} - 6um"], ["${qx}", "${bus_y} + 6um"]],
           width: "${circuit.bus.width}", gap: "${circuit.bus.gap}"}
